<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Kod Poster - Concordia Celes Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @page { size: A4 portrait; margin: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .poster {
            width: 210mm;
            height: 297mm;
            background: linear-gradient(135deg, #0b132b 0%, #1c2541 100%);
            border: 10px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 45px 40px;
        }
        .logo {
            width: 155px;
            margin-bottom: 15px;
            filter: drop-shadow(0 8px 20px rgba(212, 175, 55, 0.5));
        }
        .hotel-name {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #e8c670;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .stars {
            color: #d4af37;
            font-size: 26px;
            margin-bottom: 25px;
            letter-spacing: 6px;
        }
        .main-title {
            color: #e8c670;
            font-size: 21px;
            font-weight: 600;
            margin: 8px 0 25px;
            text-align: center;
            line-height: 1.3;
        }
        .qr-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            border: 7px solid #d4af37;
            margin-bottom: 30px;
        }
        .qr-container img {
            width: 255px;
            height: 255px;
        }
        .scan-text {
            color: #e8c670;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .scan-sub {
            color: #a5b4c4;
            font-size: 13.5px;
            line-height: 1.6;
            text-align: center;
            max-width: 420px;
            margin-bottom: 35px;
        }
        .languages {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 40px;
        }
        .lang {
            background: rgba(212, 175, 55, 0.12);
            color: #e8c670;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        .footer {
            color: #64748b;
            font-size: 12.5px;
            text-align: center;
            margin-top: auto;
        }
        .footer .web {
            color: #e8c670;
            font-size: 14.5px;
            margin-top: 10px;
        }

        @media print {
            body { background: white; }
            .poster { 
                box-shadow: none; 
                border: 8px solid #1e2937; 
                width: 210mm; 
                height: 297mm; 
                margin: 0; 
                padding: 45px 40px;
            }
        }
    </style>
</head>
<body>

<div class="poster">
    <img src="logo.png" class="logo" alt="Concordia Celes Hotel">
    <div class="hotel-name">CONCORDIA CELES HOTEL</div>
    <div class="stars">★★★★★</div>
    
    <div class="main-title">
        Misafir Memnuniyet Anketi<br>
        Guest Satisfaction Survey<br>
        Gästebefragung zur Zufriedenheit<br>
        Опрос удовлетворенности гостей<br>
        Ankieta satysfakcji gości<br>
        Chestionar de satisfacție a oaspeților
    </div>

    <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=520x520&color=1a2533&bgcolor=FFFFFF&data=https://arminkochac-cloud.github.io/ConcordiaCelesHotelOnlineAnket/" 
             alt="QR Code">
    </div>

    <div class="scan-text">QR Kodu Telefonunuzla Okutun</div>
    <div class="scan-sub">
