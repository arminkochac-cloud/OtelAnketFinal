<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Kod Poster</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }
    .poster {
      width: 420px;
      padding: 30px;
      background: white;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    .poster h1 {
      font-size: 24px;
      margin: 0 0 10px;
      color: #1a1a3e;
    }
    .poster p {
      margin: 6px 0;
      color: #444;
      font-size: 14px;
    }
    .qr img {
      width: 280px;
      height: 280px;
      margin: 15px 0;
    }
    .small {
      font-size: 12px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="poster">
    <h1>Concordia Celes Hotel</h1>
    <p>Misafir Memnuniyet Anketi</p>
    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https%3A%2F%2Farminkochac-cloud.github.io%2FConcordiaCelesHotelOnlineAnket%2Findex.html" alt="QR Code">
    </div>
    <p>QR kodu telefonunuzla okutun</p>
    <p class="small">www.concordiaceles.com</p>
  </div>
</body>
</html>
